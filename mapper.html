<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Indoor Nav — Mapper</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-light: #334155;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --recording: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .mapper-app { display: flex; flex-direction: column; height: 100%; }

    /* Header */
    .mapper-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--surface-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mapper-header h1 { font-size: 18px; }
    .mapper-header .count { color: var(--primary-light); font-weight: 600; font-size: 14px; }

    /* Status bar */
    .status-bar {
      padding: 10px 20px;
      background: var(--surface-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }
    .model-status { color: var(--warning); }
    .model-status.ready { color: var(--success); }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--surface-light);
    }
    .mode-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .mode-tab.active {
      color: var(--primary-light);
      border-bottom-color: var(--primary-light);
    }

    /* Selectors */
    .selector-bar {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      background: var(--surface);
    }
    .selector-bar select {
      flex: 1;
      min-width: 80px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--surface-light);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    /* Camera view */
    .camera-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }
    .camera-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Flash */
    .flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
    .flash.active { opacity: 0.4; }

    /* Recording indicator */
    .recording-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .recording-badge.active { display: flex; }
    .recording-dot {
      width: 10px;
      height: 10px;
      background: var(--recording);
      border-radius: 50%;
      animation: recPulse 1s ease-in-out infinite;
    }
    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Auto-capture counter overlay */
    .auto-stats {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 12px;
      display: none;
    }
    .auto-stats.active { display: block; }
    .auto-stats .stat-num { font-size: 22px; font-weight: 700; color: var(--primary-light); }
    .auto-stats .stat-label { color: var(--text-dim); margin-top: 2px; }

    /* Capture info overlay */
    .capture-info {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      padding: 16px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
    }
    .capture-info .wp-label { font-size: 17px; font-weight: 600; }
    .capture-info .wp-detail { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .capture-info .compass { font-size: 13px; color: var(--primary-light); margin-top: 4px; }

    /* Progress bar for auto-capture timer */
    .timer-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      background: var(--primary-light);
      transition: width linear;
      width: 0;
    }
    .timer-bar.active { width: 100%; }

    /* Bottom controls */
    .mapper-controls {
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .primary-btn {
      width: 100%;
      padding: 16px;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary-btn:disabled { opacity: 0.4; }
    .primary-btn.start { background: var(--primary); }
    .primary-btn.start:active:not(:disabled) { background: #4338ca; }
    .primary-btn.stop { background: var(--recording); }
    .primary-btn.stop:active { background: #dc2626; }
    .primary-btn.capture { background: var(--primary); }
    .primary-btn.capture:active:not(:disabled) { background: #4338ca; }

    .secondary-controls {
      display: flex;
      gap: 8px;
    }
    .secondary-controls button {
      flex: 1;
      padding: 11px;
      background: var(--surface-light);
      color: var(--text);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .secondary-controls button:active { opacity: 0.7; }
    .secondary-controls button.danger { background: rgba(239,68,68,0.2); color: #fca5a5; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .loading-overlay.hidden { display: none; }
    .loading-overlay .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--surface-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .loading-overlay p { margin-top: 16px; color: var(--text-dim); font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Hide sections based on mode */
    .manual-only { display: none; }
    .auto-only { display: none; }
    [data-mode="manual"] .manual-only { display: flex; }
    [data-mode="auto"] .auto-only { display: flex; }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-text">Initializing AI model...</p>
  </div>

  <div class="mapper-app" id="mapper-app" data-mode="auto">
    <div class="mapper-header">
      <h1>Mapper Tool</h1>
      <span id="feature-count" class="count">0 captures</span>
    </div>

    <div class="status-bar">
      <span id="model-status" class="model-status">Loading model...</span>
      <span id="compass-display">Compass: --</span>
    </div>

    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-tab="auto" onclick="setMode('auto')">Auto Capture</button>
      <button class="mode-tab" data-tab="manual" onclick="setMode('manual')">Manual</button>
    </div>

    <!-- Selectors: building + floor always, waypoint only in manual mode -->
    <div class="selector-bar">
      <select id="building-select"><option value="">Building...</option></select>
      <select id="floor-select"><option value="">Floor...</option></select>
      <select id="waypoint-select" class="manual-only" style="display:none"><option value="">Waypoint...</option></select>
    </div>

    <!-- Camera view -->
    <div class="camera-container">
      <video id="mapper-camera" playsinline muted></video>
      <div id="flash" class="flash"></div>

      <!-- Recording badge (auto mode) -->
      <div id="recording-badge" class="recording-badge">
        <div class="recording-dot"></div>
        <span id="recording-text">MAPPING</span>
      </div>

      <!-- Auto-capture stats -->
      <div id="auto-stats" class="auto-stats">
        <div class="stat-num" id="session-count">0</div>
        <div class="stat-label">this session</div>
      </div>

      <!-- Timer bar -->
      <div id="timer-bar" class="timer-bar"></div>

      <!-- Info overlay -->
      <div class="capture-info">
        <div id="wp-label" class="wp-label">Select building & floor to start</div>
        <div id="wp-detail" class="wp-detail"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="mapper-controls">
      <!-- Auto mode: Start/Stop -->
      <button id="auto-start-btn" class="primary-btn start auto-only" style="display:none" disabled>
        Start Mapping — Walk & I'll Capture
      </button>
      <button id="auto-stop-btn" class="primary-btn stop auto-only" style="display:none">
        Stop Mapping
      </button>

      <!-- Manual mode: Single capture -->
      <button id="capture-btn" class="primary-btn capture manual-only" style="display:none" disabled>
        Capture Reference Image
      </button>

      <div class="secondary-controls">
        <button id="export-btn">Export</button>
        <button id="import-btn">Import</button>
        <button id="clear-btn" class="danger">Clear All</button>
      </div>
    </div>
  </div>

  <input type="file" id="import-file" accept=".json" style="display:none">

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="js/buildings.js"></script>
  <script src="js/featureDB.js"></script>
  <script src="js/vps.js"></script>
  <script>
    // ============================================================
    // MAPPER TOOL — with Auto-Capture mode
    // ============================================================

    let db, vps, stream;
    let currentHeading = 0;
    let currentMode = "auto";

    // Auto-capture state
    let autoCapturing = false;
    let autoCaptureInterval = null;
    let sessionCaptureCount = 0;
    const AUTO_INTERVAL_MS = 3000; // capture every 3 seconds
    let isProcessing = false;

    // ---- INIT ----

    async function init() {
      const loadingText = document.getElementById("loading-text");

      loadingText.textContent = "Opening database...";
      db = new FeatureDB();
      await db.init();

      loadingText.textContent = "Loading AI model (this may take a moment)...";
      vps = new VPS(db);
      await vps.init((msg) => { loadingText.textContent = msg; });

      document.getElementById("model-status").textContent = "Model ready";
      document.getElementById("model-status").classList.add("ready");

      populateBuildings();
      await startCamera();
      startCompass();
      updateCount();
      bindEvents();
      setMode("auto");

      document.getElementById("loading-overlay").classList.add("hidden");
    }

    // ---- MODE SWITCHING ----

    function setMode(mode) {
      currentMode = mode;
      const app = document.getElementById("mapper-app");
      app.setAttribute("data-mode", mode);

      // Update tab styles
      document.querySelectorAll(".mode-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.tab === mode);
      });

      // Show/hide elements based on mode
      document.querySelectorAll(".auto-only").forEach(el => {
        el.style.display = mode === "auto" ? "flex" : "none";
      });
      document.querySelectorAll(".manual-only").forEach(el => {
        el.style.display = mode === "manual" ? "flex" : "none";
      });

      // Show waypoint selector only in manual mode
      document.getElementById("waypoint-select").style.display = mode === "manual" ? "" : "none";

      // Stop auto if switching away
      if (mode !== "auto" && autoCapturing) {
        stopAutoCapture();
      }

      updateUI();
    }

    // ---- BUILDING/FLOOR SELECTORS ----

    function populateBuildings() {
      const sel = document.getElementById("building-select");
      sel.innerHTML = '<option value="">Building...</option>';
      for (const [code, building] of Object.entries(BUILDINGS)) {
        sel.innerHTML += `<option value="${code}">${building.name} (${code})</option>`;
      }
    }

    function populateFloors(buildingCode) {
      const sel = document.getElementById("floor-select");
      sel.innerHTML = '<option value="">Floor...</option>';
      if (!buildingCode) return;
      const building = BUILDINGS[buildingCode];
      for (const [key, floor] of Object.entries(building.floors)) {
        sel.innerHTML += `<option value="${key}">${floor.name}</option>`;
      }
    }

    function populateWaypoints(buildingCode, floorKey) {
      const sel = document.getElementById("waypoint-select");
      sel.innerHTML = '<option value="">Waypoint...</option>';
      if (!buildingCode || !floorKey) return;
      const waypoints = BUILDINGS[buildingCode].floors[floorKey].waypoints;
      for (const wp of waypoints) {
        sel.innerHTML += `<option value="${wp.id}">${wp.label} (${wp.id})</option>`;
      }
    }

    // ---- CAMERA & COMPASS ----

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 640 }, height: { ideal: 480 } }
        });
        document.getElementById("mapper-camera").srcObject = stream;
        await document.getElementById("mapper-camera").play();
      } catch (err) {
        alert("Camera access needed for mapping. Please allow camera permission.");
      }
    }

    function startCompass() {
      if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          // iOS: request on first user interaction
          document.addEventListener("click", async function iosCompass() {
            try {
              const perm = await DeviceOrientationEvent.requestPermission();
              if (perm === "granted") {
                window.addEventListener("deviceorientation", handleOrientation);
              }
            } catch (e) {}
            document.removeEventListener("click", iosCompass);
          }, { once: true });
        } else {
          window.addEventListener("deviceorientation", handleOrientation);
        }
      }
    }

    function handleOrientation(e) {
      if (e.webkitCompassHeading !== undefined) {
        currentHeading = Math.round(e.webkitCompassHeading);
      } else if (e.alpha !== null) {
        currentHeading = Math.round((360 - e.alpha) % 360);
      }
      document.getElementById("compass-display").textContent = `Compass: ${currentHeading}°`;
    }

    // ---- AUTO CAPTURE ----

    function startAutoCapture() {
      const buildingCode = document.getElementById("building-select").value;
      const floorKey = document.getElementById("floor-select").value;
      if (!buildingCode || !floorKey) return;

      autoCapturing = true;
      sessionCaptureCount = 0;

      // Update UI
      document.getElementById("recording-badge").classList.add("active");
      document.getElementById("auto-stats").classList.add("active");
      document.getElementById("auto-start-btn").style.display = "none";
      document.getElementById("auto-stop-btn").style.display = "flex";
      document.getElementById("session-count").textContent = "0";
      document.getElementById("wp-label").textContent = "Walk slowly through the corridors...";
      document.getElementById("wp-detail").textContent = `Auto-capturing every ${AUTO_INTERVAL_MS/1000}s`;

      // Lock selectors
      document.getElementById("building-select").disabled = true;
      document.getElementById("floor-select").disabled = true;

      // Start interval
      doAutoCapture(); // First capture immediately
      autoCaptureInterval = setInterval(doAutoCapture, AUTO_INTERVAL_MS);
    }

    function stopAutoCapture() {
      autoCapturing = false;
      if (autoCaptureInterval) {
        clearInterval(autoCaptureInterval);
        autoCaptureInterval = null;
      }

      // Update UI
      document.getElementById("recording-badge").classList.remove("active");
      document.getElementById("auto-stats").classList.remove("active");
      document.getElementById("auto-start-btn").style.display = "flex";
      document.getElementById("auto-stop-btn").style.display = "none";
      document.getElementById("timer-bar").classList.remove("active");

      // Unlock selectors
      document.getElementById("building-select").disabled = false;
      document.getElementById("floor-select").disabled = false;

      const bc = document.getElementById("building-select").value;
      const fk = document.getElementById("floor-select").value;
      const bName = bc ? BUILDINGS[bc].name : "";
      const fName = (bc && fk) ? BUILDINGS[bc].floors[fk].name : "";

      document.getElementById("wp-label").textContent = sessionCaptureCount > 0
        ? `Done! ${sessionCaptureCount} images captured`
        : "Mapping stopped";
      document.getElementById("wp-detail").textContent = sessionCaptureCount > 0
        ? `${bName}, ${fName} — tap Export when finished`
        : "";

      updateCount();
    }

    async function doAutoCapture() {
      if (!autoCapturing || isProcessing) return;
      isProcessing = true;

      const buildingCode = document.getElementById("building-select").value;
      const floorKey = document.getElementById("floor-select").value;
      const video = document.getElementById("mapper-camera");

      if (!buildingCode || !floorKey) {
        isProcessing = false;
        return;
      }

      // Get all waypoints for this floor
      const waypoints = BUILDINGS[buildingCode].floors[floorKey].waypoints;

      // Pick the nearest waypoint — for auto mode we cycle through waypoints
      // based on which section of the floor the user might be in.
      // Since we can't know exact position, we tag with a generic floor waypoint.
      // The VPS matching doesn't need exact waypoint — any waypoint on the correct
      // floor works for localization. We'll use the "closest" approach:
      // assign to waypoints round-robin so there's coverage.
      const wpIndex = sessionCaptureCount % waypoints.length;
      const wp = waypoints[wpIndex];

      // Flash
      const flash = document.getElementById("flash");
      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 150);

      // Timer bar animation
      const timerBar = document.getElementById("timer-bar");
      timerBar.style.transition = "none";
      timerBar.style.width = "0";
      requestAnimationFrame(() => {
        timerBar.style.transition = `width ${AUTO_INTERVAL_MS}ms linear`;
        timerBar.style.width = "100%";
      });

      try {
        await vps.captureReference(video, wp.id, buildingCode, floorKey, currentHeading);
        sessionCaptureCount++;

        document.getElementById("session-count").textContent = sessionCaptureCount;
        document.getElementById("recording-text").textContent =
          `MAPPING · ${sessionCaptureCount}`;

        updateCount();
      } catch (err) {
        console.error("Auto-capture failed:", err);
      }

      isProcessing = false;
    }

    // ---- MANUAL CAPTURE ----

    async function captureManual() {
      const wpId = document.getElementById("waypoint-select").value;
      const buildingCode = document.getElementById("building-select").value;
      const floorKey = document.getElementById("floor-select").value;
      const video = document.getElementById("mapper-camera");

      if (!wpId || !buildingCode || !floorKey) return;

      const btn = document.getElementById("capture-btn");
      btn.disabled = true;
      btn.textContent = "Processing...";

      const flash = document.getElementById("flash");
      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 200);

      try {
        await vps.captureReference(video, wpId, buildingCode, floorKey, currentHeading);
        updateCount();
      } catch (err) {
        alert("Capture failed: " + err.message);
      }

      btn.disabled = false;
      btn.textContent = "Capture Reference Image";
    }

    // ---- UI UPDATES ----

    function updateUI() {
      const buildingCode = document.getElementById("building-select").value;
      const floorKey = document.getElementById("floor-select").value;

      if (currentMode === "auto") {
        const ready = buildingCode && floorKey;
        document.getElementById("auto-start-btn").disabled = !ready;
        if (!autoCapturing) {
          if (ready) {
            const b = BUILDINGS[buildingCode];
            document.getElementById("wp-label").textContent = `${b.name}, ${b.floors[floorKey].name}`;
            document.getElementById("wp-detail").textContent = "Hit Start and walk through the corridors";
          } else {
            document.getElementById("wp-label").textContent = "Select building & floor to start";
            document.getElementById("wp-detail").textContent = "";
          }
        }
      } else {
        const wpId = document.getElementById("waypoint-select").value;
        const ready = buildingCode && floorKey && wpId;
        document.getElementById("capture-btn").disabled = !ready;
        if (ready) {
          const b = BUILDINGS[buildingCode];
          const floor = b.floors[floorKey];
          const wp = floor.waypoints.find(w => w.id === wpId);
          document.getElementById("wp-label").textContent = wp ? wp.label : wpId;
          document.getElementById("wp-detail").textContent = `${b.name} → ${floor.name} → ${wpId}`;
        } else {
          document.getElementById("wp-label").textContent = "Select a waypoint";
          document.getElementById("wp-detail").textContent = "";
        }
      }
    }

    async function updateCount() {
      const count = await db.getCount();
      document.getElementById("feature-count").textContent = `${count} captures`;
    }

    // ---- EXPORT / IMPORT / CLEAR ----

    async function exportData() {
      const data = await db.exportAll();
      if (data.length === 0) {
        alert("No data to export. Capture some reference images first.");
        return;
      }
      const slim = data.map(({ thumbnail, ...rest }) => rest);
      const json = JSON.stringify(slim);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "map-data.json";
      a.click();
      URL.revokeObjectURL(url);
      alert(
        `Exported ${slim.length} references as map-data.json!\n\n` +
        `To make this available for all users:\n` +
        `1. Move the file to your repo's data/ folder\n` +
        `2. Commit and push to GitHub\n` +
        `3. The app will auto-load it for everyone!`
      );
    }

    async function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        const count = await db.importAll(data);
        vps.referenceFeatures = await db.getAllFeatures();
        updateCount();
        alert(`Imported ${count} reference images.`);
      } catch (err) {
        alert("Import failed: " + err.message);
      }
      e.target.value = "";
    }

    // ---- EVENT BINDING ----

    function bindEvents() {
      document.getElementById("building-select").addEventListener("change", (e) => {
        populateFloors(e.target.value);
        populateWaypoints("", "");
        updateUI();
      });

      document.getElementById("floor-select").addEventListener("change", (e) => {
        const building = document.getElementById("building-select").value;
        populateWaypoints(building, e.target.value);
        updateUI();
      });

      document.getElementById("waypoint-select").addEventListener("change", updateUI);

      // Auto mode buttons
      document.getElementById("auto-start-btn").addEventListener("click", startAutoCapture);
      document.getElementById("auto-stop-btn").addEventListener("click", stopAutoCapture);

      // Manual capture
      document.getElementById("capture-btn").addEventListener("click", captureManual);

      // Export / Import / Clear
      document.getElementById("export-btn").addEventListener("click", exportData);
      document.getElementById("import-btn").addEventListener("click", () => {
        document.getElementById("import-file").click();
      });
      document.getElementById("import-file").addEventListener("change", importData);
      document.getElementById("clear-btn").addEventListener("click", async () => {
        if (confirm("Delete ALL captured reference images? This cannot be undone.")) {
          await db.clearAll();
          vps.referenceFeatures = [];
          updateCount();
        }
      });
    }

    // ---- BOOT ----

    init().catch(err => {
      document.getElementById("loading-text").textContent = "Error: " + err.message;
      console.error(err);
    });
  </script>
</body>
</html>
